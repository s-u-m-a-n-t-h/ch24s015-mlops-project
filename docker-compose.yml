version: '3.8'

services:
  reverse-proxy:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    environment:
      - APP_NAME=PortfolioBackend
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: src/app/Dockerfile
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
