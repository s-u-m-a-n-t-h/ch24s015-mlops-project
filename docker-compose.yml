version: '3.8'

services:
  reverse-proxy:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    environment:
      - APP_NAME=PortfolioBackend
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: src/app/Dockerfile
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - app-network

  airflow-db:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - app-network

  airflow-webserver:
    image: apache/airflow:2.7.1-python3.10
    command: webserver
    depends_on:
      - airflow-db
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./src/pipeline:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./requirements.txt:/opt/airflow/requirements.txt
    ports:
      - "8080:8080"
    networks:
      - app-network

  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.10
    command: scheduler
    depends_on:
      - airflow-db
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./src/pipeline:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./requirements.txt:/opt/airflow/requirements.txt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
