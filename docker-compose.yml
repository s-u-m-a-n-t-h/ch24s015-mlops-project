services:
  reverse-proxy:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    environment:
      - APP_NAME=PortfolioBackend
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: src/app/Dockerfile
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - app-network

  airflow-db:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - app-network

  airflow-init:
    build:
      context: .
      dockerfile: src/pipeline/Dockerfile.airflow
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=4620d44093f45d1d646a7824c160a0a5
    depends_on:
      - airflow-db
    networks:
      - app-network
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email psumanthsrinivas@gmail.com --password admin"

  airflow-webserver:
    build:
      context: .
      dockerfile: src/pipeline/Dockerfile.airflow
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=4620d44093f45d1d646a7824c160a0a5
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    volumes:
      - ./src/pipeline:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./.dvc:/opt/airflow/.dvc
      - ./.git:/opt/airflow/.git
      - ./.dvcignore:/opt/airflow/.dvcignore
    ports:
      - "8081:8080"
    networks:
      - app-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: src/pipeline/Dockerfile.airflow
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=4620d44093f45d1d646a7824c160a0a5
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW_UID=0
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    volumes:
      - ./src/pipeline:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./.dvc:/opt/airflow/.dvc
      - ./.git:/opt/airflow/.git
      - ./.dvcignore:/opt/airflow/.dvcignore
    networks:
      - app-network

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////opt/mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/opt/mlflow/artifacts
    volumes:
      - ./mlruns:/opt/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////opt/mlflow/mlflow.db
      --default-artifact-root /opt/mlflow/artifacts
      --host 0.0.0.0
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
